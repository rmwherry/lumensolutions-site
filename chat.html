/* ── RESET ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ── TOKENS ── */
:root {
  --bg:             #04070e;
  --nav-bg:         rgba(4,7,14,0.85);

  --text-sub:       rgba(175,205,255,0.82);

  --card-bg:        rgba(10,15,30,0.6);
  --card-border:    rgba(45,80,200,0.2);
  --btn-border:     rgba(45,80,200,0.5);
  --btn-fill:       #2D50C8;
  --toggle-bg:      rgba(255,255,255,0.06);
  --toggle-border:  rgba(255,255,255,0.12);
  --neon-hero:
    0 0 6px  #fff,
    0 0 18px rgba(175,205,255,0.9),
    0 0 40px rgba(80,125,245,0.75),
    0 0 80px rgba(45,80,200,0.55);
  --neon-tag:   0 0 8px rgba(45,80,200,0.25);
  /* Chat-specific */
  --msg-l-bg:       rgba(45,80,200,0.07);
  --msg-l-border:   rgba(45,80,200,0.22);
  --msg-l-accent:   rgba(45,80,200,0.5);
  --msg-u-bg:       #2D50C8;
  --input-bg:       rgba(255,255,255,0.03);
  --input-border:   rgba(45,80,200,0.22);
  --input-focus:    rgba(45,80,200,0.6);
  --cta-bg:         rgba(45,80,200,0.09);
  --cta-border:     rgba(45,80,200,0.3);
}

[data-theme="light"] {
  --bg:             #fcfcfc;
  --nav-bg:         rgba(252,252,252,0.92);
  --text-primary:   #12266e;
  --text-sub:       #3a4a7a;
  --text-tag:       #6e78a0;
  --rule:           #dde0ea;
  --card-bg:        #f4f6fd;
  --card-border:    #dde0ea;
  --btn-border:     #12266e;
  --btn-fill:       #12266e;
  --toggle-bg:      rgba(0,0,0,0.04);
  --toggle-border:  rgba(0,0,0,0.10);
  --neon-hero:      none;
  --neon-tag:       none;
  --msg-l-bg:       rgba(18,38,110,0.05);
  --msg-l-border:   rgba(18,38,110,0.15);
  --msg-l-accent:   rgba(18,38,110,0.35);
  --msg-u-bg:       #2D50C8;
  --input-bg:       rgba(0,0,0,0.03);
  --input-border:   rgba(18,38,110,0.18);
  --input-focus:    rgba(18,38,110,0.45);
  --cta-bg:         rgba(18,38,110,0.06);
  --cta-border:     rgba(18,38,110,0.18);
}

/* ── BASE ── */

.typing-dot:nth-child(3) { animation-delay: 0.36s; }

<!-- ── CHAT ── -->
<div class="chat-outer">

  <header class="chat-header">
    <span class="chat-header-label">Lumen Chat</span>
    <h1 class="chat-header-title">Talk to Richard&rsquo;s AI.</h1>
    <p class="chat-header-sub">Ask about the work, the services, or what a project together might look like.</p>
  </header>

  <div class="chat-thread" id="chat-thread"></div>

  <div class="chat-composer">
    <div class="composer-row">
      <textarea id="chat-input" placeholder="What are you working on?" rows="1"></textarea>
      <button id="send-btn" aria-label="Send"><i class="ti ti-send"></i></button>
    </div>
    <p class="chat-disclaimer">Powered by Claude &middot; Conversations are not stored</p>
  </div>

</div>

<script>
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  LUMEN CHAT — Frontend
//  Backend: /.netlify/functions/chat (see LumenChat_CodeSpec_v1.md)
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

const API       = '/.netlify/functions/chat';
const ROUTE_SIG = '[ROUTE_CTA]';
const EMAIL     = 'rmwherry@gmail.com';
const OPENER    = "I’m Lumen — Richard’s AI. I know the work he does, the problems he solves, and how he approaches clients. What are you working on?";

// Conversation history sent to API
let history  = [];
let loading  = false;

const thread  = document.getElementById('chat-thread');
const input   = document.getElementById('chat-input');
const sendBtn = document.getElementById('send-btn');

// ── INIT ────────────────────────────────────────────────
function init() {
  // Render Lumen's opening message without an API call
  history.push({ role: 'assistant', content: OPENER });
  appendMsg('assistant', OPENER);
  input.focus();
}

// ── SEND ────────────────────────────────────────────────
async function send() {
  const text = input.value.trim();
  if (!text || loading) return;

  // Add user turn
  history.push({ role: 'user', content: text });
  appendMsg('user', text);
  input.value = '';
  resize();

  setLoading(true);
  const typing = showTyping();

  try {
    const res = await fetch(API, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ messages: history })
    });

    removeEl(typing);

    if (!res.ok) throw new Error(res.status);

    let reply;
    const ct = res.headers.get('content-type') || '';

    if (ct.includes('text/event-stream')) {
      reply = await consumeStream(res);
    } else {
      const data = await res.json();
      reply = data.content || data.message || fallbackMsg();
      appendMsg('assistant', reply);
    }

    history.push({ role: 'assistant', content: reply });

  } catch (err) {
    removeEl(typing);
    const msg = fallbackMsg();
    history.push({ role: 'assistant', content: msg });
    appendMsg('assistant', msg);
    console.warn('[LumenChat] API error:', err);
  }

  setLoading(false);
}

// ── STREAM ──────────────────────────────────────────────
async function consumeStream(res) {
  const { wrapper, bubble } = buildMsgEl('assistant');
  thread.appendChild(wrapper);

  const reader  = res.body.getReader();
  const decoder = new TextDecoder();
  let buf = '', full = '';

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    buf += decoder.decode(value, { stream: true });

    const lines = buf.split('\n');
    buf = lines.pop();

    for (const line of lines) {
      if (!line.startsWith('data: ')) continue;
      const raw = line.slice(6).trim();
      if (raw === '[DONE]') continue;
      try {
        const j = JSON.parse(raw);
        // Support both Anthropic SSE shape and OpenAI-compatible shape
        const chunk = j.delta?.text
          || j.choices?.[0]?.delta?.content
          || '';
        full += chunk;
        bubble.innerHTML = md(full.replace(ROUTE_SIG, '').trim());
        scrollDown();
      } catch { /* partial JSON — ignore */ }
    }
  }

  if (full.includes(ROUTE_SIG)) appendRouteCTA();
  return full;
}

// ── RENDER HELPERS ───────────────────────────────────────
function appendMsg(role, content) {
  const { wrapper, bubble } = buildMsgEl(role);
  const display = content.replace(ROUTE_SIG, '').trim();
  bubble.innerHTML = md(display);
  thread.appendChild(wrapper);
  scrollDown();
  if (content.includes(ROUTE_SIG)) appendRouteCTA();
}

function buildMsgEl(role) {
  const isLumen = role === 'assistant';
  const wrapper = document.createElement('div');
  wrapper.className = `msg msg--${isLumen ? 'lumen' : 'user'}`;

  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  avatar.textContent = isLumen ? 'L' : 'R';

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';

  wrapper.appendChild(avatar);
  wrapper.appendChild(bubble);
  return { wrapper, bubble };
}

function showTyping() {
  const { wrapper, bubble } = buildMsgEl('assistant');
  wrapper.id = 'typing';
  bubble.innerHTML = '<div class="typing-dots"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>';
  thread.appendChild(wrapper);
  scrollDown();
  return wrapper;
}

function appendRouteCTA() {
  // Build mailto with last user message as context
  const lastUser = [...history].reverse().find(m => m.role === 'user');
  const subject  = encodeURIComponent('Working on something — via Lumen Chat');
  const body     = encodeURIComponent(
    'Hi Richard,\n\nI was chatting with Lumen on your site. Here\'s what I described:\n\n'
    + (lastUser ? lastUser.content : '')
    + '\n\n'
  );
  const mailto = `mailto:${EMAIL}?subject=${subject}&body=${body}`;

  const card = document.createElement('div');
  card.className = 'route-cta';
  card.innerHTML = `
    <span class="route-cta-label">Ready to go deeper</span>
    <p class="route-cta-title">Connect with Richard directly.</p>
    <p class="route-cta-sub">Lumen can only take you so far. A 30-minute conversation with Richard is where the real triage happens.</p>
    <div class="route-cta-btns">
      <a class="cta-btn-primary" href="${mailto}">Email Richard &rarr;</a>
      <button class="cta-btn-secondary" onclick="dismissCTA(this)">Keep exploring</button>
    </div>
  `;
  thread.appendChild(card);
  scrollDown();
}

function fallbackMsg() {
  return 'I hit a snag on my end. You can reach Richard directly at rmwherry@gmail.com — that\'s the most reliable path anyway. ' + ROUTE_SIG;
}

// Minimal markdown: bold + line breaks
function md(text) {
  return text
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\n\n/g, '</p><p>')
    .replace(/\n/g, '<br>');
}

// ── UI UTILS ────────────────────────────────────────────
function setLoading(state) {
  loading        = state;
  sendBtn.disabled = state;
  input.disabled   = state;
}

function removeEl(el) { if (el && el.parentNode) el.parentNode.removeChild(el); }
function scrollDown()  { thread.scrollTop = thread.scrollHeight; }

function dismissCTA(btn) {
  btn.closest('.route-cta').remove();
  input.focus();
}

function resize() {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 130) + 'px';
}

// ── THEME ───────────────────────────────────────────────
function toggleTheme() {
  const dark = document.documentElement.getAttribute('data-theme') === 'dark';
  document.documentElement.setAttribute('data-theme', dark ? 'light' : 'dark');
  document.getElementById('toggle-label').textContent = dark ? 'Dark' : 'Light';
  document.getElementById('icon-moon').style.display  = dark ? 'none' : '';
  document.getElementById('icon-sun').style.display   = dark ? '' : 'none';
}

function toggleMobile() {
  document.getElementById('mobile-menu').classList.toggle('open');
}

// ── EVENTS ──────────────────────────────────────────────
sendBtn.addEventListener('click', send);
input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});
input.addEventListener('input', resize);

// ── GO ──────────────────────────────────────────────────
init();
</script>
</main>
</body>
</html>
